name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: cs2pr
      - run: composer install --no-progress --prefer-dist
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis
      - run: composer install --no-progress --prefer-dist
      - run: vendor/bin/phpstan analyse

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: redis://localhost:6379/messages
      MERCURE_URL: http://localhost/.well-known/mercure
      MERCURE_PUBLIC_URL: http://localhost/.well-known/mercure
      MERCURE_JWT_SECRET: test_secret
      APP_ENV: test
      APP_SECRET: test_secret_for_ci
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis
      - run: composer install --no-progress --prefer-dist
      - run: php bin/console doctrine:database:create --env=test --if-not-exists
      - run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
      - run: php bin/console importmap:install --env=test
      - run: vendor/bin/phpunit
