nelmio_api_doc:
    documentation:
        info:
            title: "Portfolio API"
            version: "1.0.0"
            description: "Portfolio backend — Symfony 7 + FrankenPHP + Mercure"
        servers:
            - url: /
        security:
            - Bearer: []
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
    areas:
        default:
            path_patterns: ['^/api(?!/doc)']
    models:
        use_jms: true
    html_config:
        assets_mode: cdn
